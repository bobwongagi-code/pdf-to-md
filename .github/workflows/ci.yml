name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.9"
          - "3.11"
    env:
      PADDLEOCR_DOC_PARSING_API_URL: https://example.com/layout-parsing
      PADDLEOCR_ACCESS_TOKEN: dummy-token
      PADDLEOCR_DOC_PARSING_TIMEOUT: "120"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install -r scripts/requirements.txt

      - name: Show version
        run: python scripts/vl_caller.py --version

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Smoke test without API call
        run: python scripts/smoke_test.py --skip-api-test
